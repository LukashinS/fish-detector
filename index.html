<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fish Detector Mobile</title>
    <style>
        body { margin: 0; background: #111; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        #container { 
            position: relative; 
            width: 100%; 
            max-width: 640px; 
            aspect-ratio: 4/3; 
            background: #000;
            overflow: hidden; 
            touch-action: none; /* Предотвращает скролл при выборе цвета */
        }

        #canvas { 
            width: 100%; 
            height: 100%; 
            display: block;
        }

        #counter { 
            position: absolute; top: 10px; left: 10px; 
            background: rgba(0,0,0,0.7); color: #00e5ff; 
            padding: 8px 15px; border-radius: 5px; font-weight: bold; z-index: 5; 
        }

        .controls { 
            width: 95%; max-width: 640px; 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            padding: 15px; box-sizing: border-box; background: #222;
        }

        .control-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 10px; color: #888; text-transform: uppercase; }
        input[type=range] { width: 100%; }
        
        #color-preview { width: 30px; height: 30px; border: 2px solid #fff; border-radius: 4px; }
        .picker-row { display: flex; align-items: center; gap: 10px; }
        
        #status { font-size: 12px; color: #555; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="container">
        <div id="counter">FISH: 0</div>
        <canvas id="canvas" width="640" height="480"></canvas>
    </div>
    <video id="video" autoplay playsinline muted style="display:none;"></video>

    <div class="controls">
        <div class="control-group">
            <label>Цвет</label>
            <div class="picker-row">
                <input type="color" id="colorPicker" value="#ffeb3b">
                <div id="color-preview" style="background: #ffeb3b;"></div>
            </div>
        </div>

        <div class="control-group">
            <label>Зум: <span id="vZoom">1.0x</span></label>
            <input type="range" id="zoom" min="1" max="5" step="0.1" value="1">
        </div>

        <div class="control-group">
            <label>Точность (Hue): <span id="vT">15</span></label>
            <input type="range" id="threshold" min="2" max="50" value="15">
        </div>

        <div class="control-group">
            <label>Мин. размер: <span id="v3">400</span></label>
            <input type="range" id="minSize" min="50" max="3000" step="50" value="400">
        </div>
    </div>
    <div id="status">Запуск камеры...</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const statusEl = document.getElementById('status');
        
        let targetHSL = { h: 54, s: 100, l: 50 };
        let currentZoom = 1;

        // Конвертация
        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            const max = Math.max(r, g, b), min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;
            if (max === min) h = s = 0;
            else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = (g - b) / d + (g < b ? 6 : 0); break;
                    case g: h = (b - r) / d + 2; break;
                    case b: h = (r - g) / d + 4; break;
                }
                h /= 6;
            }
            return { h: h * 360, s: s * 100, l: l * 100 };
        }

        // Выбор цвета (адаптировано под тач)
        const pickColor = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const x = (clientX - rect.left) * (640 / rect.width);
            const y = (clientY - rect.top) * (480 / rect.height);
            
            const p = ctx.getImageData(x, y, 1, 1).data;
            const hex = "#" + ((1 << 24) + (p[0] << 16) + (p[1] << 8) + p[2]).toString(16).slice(1);
            document.getElementById('colorPicker').value = hex;
            document.getElementById('color-preview').style.background = hex;
            targetHSL = rgbToHsl(p[0], p[1], p[2]);
        };

        canvas.addEventListener('mousedown', pickColor);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); pickColor(e); });

        // Зум
        document.getElementById('zoom').addEventListener('input', (e) => {
            currentZoom = parseFloat(e.target.value);
            document.getElementById('vZoom').textContent = currentZoom.toFixed(1) + 'x';
            canvas.style.transform = `scale(${currentZoom})`;
        });

        // Запуск камеры (Android/iOS)
        async function start() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 640, height: 480 }
                });
                video.srcObject = stream;
                statusEl.textContent = "✅ Камера готова. Используйте заднюю камеру.";
                video.onloadedmetadata = () => {
                    video.play();
                    requestAnimationFrame(processFrame);
                }
            } catch (err) {
                statusEl.textContent = "❌ Ошибка: " + err.message;
            }
        }

        const STEP = 5;
        const GW = 640 / STEP, GH = 480 / STEP;
        const visited = new Uint8Array(GW * GH);

        function processFrame() {
            ctx.drawImage(video, 0, 0, 640, 480);
            const data = ctx.getImageData(0, 0, 640, 480).data;
            const mask = new Uint8Array(GW * GH);
            
            const tH = parseInt(document.getElementById('threshold').value);
            const mSize = parseInt(document.getElementById('minSize').value);

            for (let y = 0; y < 480; y += STEP) {
                for (let x = 0; x < 640; x += STEP) {
                    const i = (y * 640 + x) * 4;
                    const hsl = rgbToHsl(data[i], data[i+1], data[i+2]);
                    let hDiff = Math.abs(hsl.h - targetHSL.h);
                    if (hDiff > 180) hDiff = 360 - hDiff;

                    if (hDiff < tH && hsl.s > 20 && hsl.l > 15 && hsl.l < 85) {
                        mask[Math.floor(y/STEP) * GW + Math.floor(x/STEP)] = 1;
                    }
                }
            }

            visited.fill(0);
            let count = 0;
            const queue = [];

            for (let i = 0; i < mask.length; i++) {
                if (mask[i] && !visited[i]) {
                    let area = 0;
                    let minX = i % GW, maxX = minX, minY = Math.floor(i / GW), maxY = minY;
                    queue.push(i);
                    visited[i] = 1;

                    while(queue.length > 0) {
                        const curr = queue.shift();
                        area++;
                        const cx = curr % GW, cy = Math.floor(curr / GW);
                        if (cx < minX) minX = cx; if (cx > maxX) maxX = cx;
                        if (cy < minY) minY = cy; if (cy > maxY) maxY = cy;

                        const neighbors = [curr-1, curr+1, curr-GW, curr+GW];
                        for(let n of neighbors) {
                            if (n >= 0 && n < mask.length && mask[n] && !visited[n]) {
                                visited[n] = 1;
                                queue.push(n);
                            }
                        }
                    }

                    if (area * (STEP * STEP) >= mSize) {
                        count++;
                        ctx.strokeStyle = '#00e5ff';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(minX*STEP, minY*STEP, (maxX-minX)*STEP, (maxY-minY)*STEP);
                    }
                }
            }

            document.getElementById('counter').textContent = `FISH: ${count}`;
            document.getElementById('vT').textContent = tH;
            document.getElementById('v3').textContent = mSize;
            requestAnimationFrame(processFrame);
        }

        start();
    </script>
</body>
</html>
